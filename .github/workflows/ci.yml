name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the workflow only reads the repo. Jobs that need more must
# opt in explicitly. This caps the damage if a build step is compromised.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (iPad simulator)
    # NOTE: iPadOS 26.5 ships with a specific Xcode. GitHub-hosted runner images
    # lag the latest SDKs, so this may need a self-hosted runner (or a newer
    # `macos-*` image) once 26.5 is available. `macos-15` is a realistic current
    # default; bump it together with the Xcode version below when 26.5 lands.
    runs-on: macos-15
    env:
      PROJECT: GoodNotesReplacement.xcodeproj
      SCHEME: GoodNotesReplacement
      # Target simulator. The runner must have a matching iPadOS runtime
      # installed; we resolve the concrete device dynamically below and fall
      # back to this name if discovery fails.
      SIM_NAME: "iPad Pro 13-inch (M4)"
      SIM_OS: "26.5"

    steps:
      # Pin third-party actions to a full commit SHA (not a mutable tag) so a
      # hijacked tag can't swap in malicious code; Dependabot bumps these. Do
      # not leave the checkout token in .git/config for later steps to read.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Pin Xcode to the version that bundles the iPadOS 26.5 SDK. Adjust the
      # version string to whatever the chosen runner image provides.
      - name: Select Xcode
        run: |
          set -euo pipefail
          # Prefer an Xcode that ships iPadOS ${SIM_OS}; otherwise use the latest.
          sudo xcode-select -p
          xcodebuild -version
          xcodebuild -showsdks | grep -i ios || true

      - name: Install tooling
        run: |
          set -euo pipefail
          # NOTE: Homebrew formulae are not version-pinned here; they resolve to
          # the runner image's current bottles. The build only consumes their
          # output (an .xcodeproj / prettified logs), never publishes an
          # artifact built by them, which bounds the supply-chain exposure.
          brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      # Pick a concrete, *available* iPad simulator for the requested runtime so
      # the destination is unambiguous. Falls back to the env default.
      - name: Resolve simulator destination
        id: sim
        run: |
          set -o pipefail
          DEST="platform=iOS Simulator,name=${SIM_NAME},OS=${SIM_OS}"
          # If the exact OS isn't installed, drop the OS pin and let xcodebuild
          # choose the newest available runtime for that device.
          if ! xcrun simctl list runtimes | grep -q "iOS ${SIM_OS}"; then
            echo "iOS ${SIM_OS} runtime not found; using newest available for ${SIM_NAME}."
            DEST="platform=iOS Simulator,name=${SIM_NAME}"
          fi
          echo "destination=${DEST}" >> "$GITHUB_OUTPUT"
          echo "Using destination: ${DEST}"

      - name: Resolve dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "${PROJECT}" \
            -scheme "${SCHEME}" || true

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -project "${PROJECT}" \
            -scheme "${SCHEME}" \
            -destination "${{ steps.sim.outputs.destination }}" \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            | xcbeautify

      - name: Upload xcresult
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: TestResults.xcresult
          path: TestResults.xcresult
          retention-days: 14
          if-no-files-found: warn
